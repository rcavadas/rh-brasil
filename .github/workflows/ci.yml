name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start platform services for API tests
        run: docker compose -f infra/docker-compose.yml up -d postgres redis

      - name: API tests
        run: npm run test -w @rh/api

      - name: Web tests
        run: npm run test -w @rh/web

      - name: Redis policy check
        run: npm run check:redis-platform

      - name: Stop platform services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
