name: Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/rh-brasil-public-api
          - service: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/rh-brasil-public-web
          - service: worker
            dockerfile: apps/worker/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/rh-brasil-public-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:main
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
