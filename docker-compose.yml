services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://rh:rh@postgres:5432/rh
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      AUTH_MODE: mixed
      ESOCIAL_QUEUE_ENABLED: "true"
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://172.17.0.3:8080/realms/rh}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-https://172.17.0.3:8080/realms/rh/protocol/openid-connect/certs}
      OIDC_AUDIENCE: ""
      CORS_ORIGINS: ${CORS_ORIGINS:-https://172.17.0.3:5173}
    depends_on:
      - postgres
      - redis
      - keycloak
      - minio
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: 5173
      WEB_PUBLIC_ORIGIN: ${WEB_PUBLIC_ORIGIN:-https://172.17.0.3:5173}
      API_INTERNAL_URL: http://api:3000
      WEB_REDIS_URL: redis://redis:6379
      KEYCLOAK_BROWSER_URL: ${KEYCLOAK_BROWSER_URL:-https://172.17.0.3:8080}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: rh
      KEYCLOAK_CLIENT_ID: rh-web
      WEB_SESSION_COOKIE_NAME: rh.web.session
      WEB_SESSION_MAX_AGE_SECONDS: 604800
      WEB_SESSION_IDLE_TIMEOUT_SECONDS: 28800
      WEB_SESSION_STORE_PATH: /app/data/web-sessions.json
    depends_on:
      - api
      - keycloak
    ports:
      - "5173:5173"
    volumes:
      - web_session_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5173/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://rh:rh@postgres:5432/rh
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      ESOCIAL_QUEUE_ENABLED: "true"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rh
      POSTGRES_USER: rh
      POSTGRES_PASSWORD: rh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rh -d rh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: rh
      KC_DB_USERNAME: rh
      KC_DB_PASSWORD: rh
      KC_HOSTNAME: ${KC_HOSTNAME:-https://172.17.0.3:8080}
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://172.17.0.3:9000}
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-https://172.17.0.3:9001}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data:
  web_session_data:
